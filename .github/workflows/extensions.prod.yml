name: "Extensions Build & Publish Prod"
on:
  push:
    branches:
      - main
    paths:
      - ".deploy/extensions/**"
      - ".github/workflows/extensions.prod.yml"
      - "apps/extensions/**"
      - "package.json"
      - "yarn.lock"

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ever-k8s-linux-x64-4

    environment: prod
    
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.14.0"
          cache: "yarn"

      - name: Configure Registry
        shell: bash
        run: |
          if [ -n "${{ secrets.VERDACCIO_TOKEN }}" ]; then
            echo "//packages.ever.co/:_authToken=${{ secrets.VERDACCIO_TOKEN }}" >> .npmrc
            echo "registry=https://packages.ever.co/" >> .npmrc
          fi

      - name: Install Packages
        run: |
          cd apps/extensions && yarn install --network-timeout 1000000 --frozen-lockfile
        env:
          NODE_OPTIONS: '--dns-result-order=ipv4first'

      - name: Build and zip extension artifact
        run: cd apps/extensions && yarn build -- --zip
