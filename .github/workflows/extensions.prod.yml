name: "Extensions Build & Publish Prod"
on:
  push:
    branches:
      - main
    paths:
      - ".deploy/extensions/**"
      - ".github/workflows/extensions.prod.yml"
      - "apps/extensions/**"
      - "package.json"
      - "yarn.lock"

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubicloud-standard-2

    environment: prod
    
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.14.0"
          cache: "yarn"

      - name: Install Packages
        run: |
          cd apps/extensions && yarn install --network-timeout 1000000 --frozen-lockfile

      - name: Build and zip extension artifact
        run: cd apps/extensions && yarn build -- --zip
