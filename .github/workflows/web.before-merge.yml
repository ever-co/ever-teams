name: Web Build Before Merge
on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - ".deploy/web/**"
      - ".github/workflows/web.before-merge.yml"
      - "apps/web/**"
      - "package.json"
      - "yarn.lock"
      - "README.md"

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubicloud-standard-4

    steps:
      - uses: actions/checkout@v4

      - name: Skip workflow if PR is from develop to main
        if: github.event.pull_request.head.ref == 'develop' && github.event.pull_request.base.ref == 'main'
        run: |
          echo "PR is from develop to main. Skipping the workflow."
          echo "::set-output name=skipped::true"
        id: skip_check

      - name: Check if skipped
        if: steps.skip_check.outputs.skipped == 'true'
        run: echo "Workflow was skipped" && exit 0

      - name: Free disk space
        run: |
            df -h /
            sudo swapoff -a
            sudo apt clean
            docker image ls -aq
            if [ "$(docker image ls -aq)" ]; then
              docker rmi $(docker image ls -aq)
            fi
            find ~/work/_temp -name "cache.tgz" -exec rm -f {} \;
            sudo rm -rf "/usr/local/share/boost"
            sudo rm -rf "$AGENT_TOOLSDIRECTORY"
            df -h /

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.14.0"
          cache: "yarn"

      - name: Configure Registry
        run: |
          echo "//packages.ever.co/:_authToken=${{ secrets.VERDACCIO_TOKEN }}" >> .npmrc
          echo "registry=https://packages.ever.co/" >> .npmrc

      - name: Install Packages
        run: |
          yarn install --network-timeout 1000000 --frozen-lockfile
        env:
          NODE_OPTIONS: '--dns-result-order=ipv4first'

      - name: Build Web

        run: |
          yarn build:web
