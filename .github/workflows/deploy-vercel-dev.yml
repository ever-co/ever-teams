name: Web Build & Vercel Deploy DEV
on:
  push:
    branches:
      - vercel
    paths:
      - ".deploy/web/**"
      - ".github/workflows/**"
      - "apps/web/**"
      - "package.json"
      - "yarn.lock"

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubicloud-standard-2

    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.14.0"
          cache: "yarn"

      - name: Configure Registry
        shell: bash
        run: |
          if [ -n "${{ secrets.VERDACCIO_TOKEN }}" ]; then
            echo "//packages.ever.co/:_authToken=${{ secrets.VERDACCIO_TOKEN }}" >> .npmrc
            echo "registry=https://packages.ever.co/" >> .npmrc
          fi

      - name: Install Packages
        run: |
          yarn install --network-timeout 1000000 --frozen-lockfile
        env:
          NODE_OPTIONS: '--dns-result-order=ipv4first'

      - name: Build Web
        run: |
          yarn build:web

      - name: Install Vercel CLI
        run: npm install -g vercel@22.0.1

      - name: Deploy to Vercel
        uses: BetaHuhn/deploy-to-vercel-action@v1
        with:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }} # Required
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Optional
          GITHUB_DEPLOYMENT_ENV: Preview
          PRODUCTION: false
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID}} #Required
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WEB_PROJECT_ID}} #Required
          WORKING_DIRECTORY: ./
          # ALIAS_DOMAINS: |
          #   appdev.ever.team
