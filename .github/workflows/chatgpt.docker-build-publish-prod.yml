name: Build and Publish ChatGPT App Docker Images Prod

on:
  push:
    branches: [master, main]
    paths:
      - 'apps/chatgpt/**'
      - '.github/workflows/chatgpt.docker-build-publish-prod.yml'

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  ever-teams-chatgpt:
    permissions:
      contents: read
      packages: write
    runs-on: ${{ vars.RUNNER_LINUX_X64_4 || 'ubuntu-latest' }}

    environment: prod

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v7

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN || github.token }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./apps/chatgpt/Dockerfile
          load: true
          platforms: linux/amd64
          tags: |
            ghcr.io/ever-co/ever-teams-chatgpt-prod:latest
            registry.digitalocean.com/ever/ever-teams-chatgpt-prod:latest
          cache-from: type=registry,ref=ghcr.io/ever-co/ever-teams-chatgpt-prod:latest
          cache-to: type=inline
          build-args: |
            NODE_ENV=production

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry with short-lived credentials
        run: doctl registry login --expiry-seconds 3600

      - name: Push to DigitalOcean Registry
        run: |
          docker push registry.digitalocean.com/ever/ever-teams-chatgpt-prod:latest

      - name: Push to Github Registry
        run: |
          docker push ghcr.io/ever-co/ever-teams-chatgpt-prod:latest
