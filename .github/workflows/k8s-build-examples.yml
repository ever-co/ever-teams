name: k8s-build-examples
on:
  workflow_dispatch: {}
  push:
    branches: [develop]
    paths: ["packages/toolkit/examples/**","apps/storybook/**","packages/toolkit/builder/**"]
concurrency: { group: k8s-build-examples-${{ github.ref }}, cancel-in-progress: true }
permissions: { contents: read, packages: write }
jobs:
  build:
    runs-on: ${{ vars.RUNNER_LINUX_X64_8 || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { image: ever-teams-storybook, dockerfile: apps/storybook/Dockerfile }
          - { image: ever-teams-example-vite, dockerfile: packages/toolkit/examples/vite/Dockerfile }
          - { image: ever-teams-example-next, dockerfile: packages/toolkit/examples/next/Dockerfile }
          - { image: ever-teams-example-next-boilerplate, dockerfile: packages/toolkit/examples/next-boilerplate-ixartz/Dockerfile }
          - { image: ever-teams-example-saas, dockerfile: packages/toolkit/examples/saas-starter/Dockerfile }
          - { image: ever-teams-example-base, dockerfile: packages/toolkit/examples/base/Dockerfile }
          - { image: ever-teams-example-remix, dockerfile: packages/toolkit/examples/remix/Dockerfile }
          - { image: ever-teams-builder, dockerfile: packages/toolkit/builder/Dockerfile }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with: { registry: ghcr.io, username: ${{ github.actor }}, password: ${{ secrets.GITHUB_TOKEN }} }
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:prod
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:sha-${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:buildcache,mode=max
