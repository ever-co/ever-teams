<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ever-Teams Timer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: transparent;
            padding: 16px;
        }

        .timer-container {
            background: white;
            border-radius: 16px;
            border: 1px solid #e0e0e0;
            padding: 20px;
            max-width: 400px;
            margin: 0 auto;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .timer-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .timer-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3826A6 0%, #A11DB1 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }

        .timer-status {
            flex: 1;
        }

        .timer-status-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #666;
            margin-bottom: 4px;
        }

        .timer-status-label.running {
            color: #22ae83;
        }

        .timer-status-label.stopped {
            color: #666;
        }

        .timer-project {
            font-size: 16px;
            font-weight: 600;
            color: #000;
        }

        .timer-display {
            background: linear-gradient(135deg, #3826A6 0%, #A11DB1 100%);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            margin: 16px 0;
        }

        .timer-time {
            font-size: 48px;
            font-weight: 700;
            color: white;
            font-variant-numeric: tabular-nums;
            letter-spacing: 2px;
        }

        .timer-details {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 16px;
        }

        .timer-detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .timer-detail-row:last-child {
            border-bottom: none;
        }

        .timer-detail-label {
            font-size: 14px;
            color: #666;
            font-weight: 500;
        }

        .timer-detail-value {
            font-size: 14px;
            color: #000;
            font-weight: 600;
        }

        .timer-task {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            margin-top: 12px;
        }

        .timer-task-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }

        .timer-task-name {
            font-size: 14px;
            color: #000;
            font-weight: 500;
        }

        .timer-footer {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .timer-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .timer-badge.billable {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .timer-badge.non-billable {
            background: #fce4ec;
            color: #c2185b;
        }

        .timer-timestamp {
            font-size: 12px;
            color: #999;
        }

        .timer-progress {
            width: 100%;
            height: 4px;
            background: #f0f0f0;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 12px;
        }

        .timer-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #3826A6 0%, #A11DB1 100%);
            transition: width 0.3s ease;
        }

        .timer-no-data {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .timer-no-data-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .timer-no-data-text {
            font-size: 16px;
            font-weight: 500;
        }

        @media (max-width: 480px) {
            .timer-container {
                border-radius: 12px;
                padding: 16px;
            }

            .timer-time {
                font-size: 36px;
            }

            .timer-display {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="timer-container" id="timerWidget">
        <!-- Content will be injected by JavaScript -->
    </div>

    <script>
        (function() {
            // Get data from parent window or embedded data
            const data = window.__WIDGET_DATA__ || {};

            function formatTime(seconds) {
                if (!seconds && seconds !== 0) return '00:00:00';

                const hours = Math.floor(seconds / 3600);
                const minutes = Math.floor((seconds % 3600) / 60);
                const secs = seconds % 60;

                return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            }

            function formatDateTime(isoString) {
                if (!isoString) return 'N/A';

                const date = new Date(isoString);
                const now = new Date();
                const isToday = date.toDateString() === now.toDateString();

                const timeOptions = {
                    hour: '2-digit',
                    minute: '2-digit',
                    hour12: true
                };

                const time = date.toLocaleTimeString('en-US', timeOptions);

                if (isToday) {
                    return `Today at ${time}`;
                }

                return `${date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} at ${time}`;
            }

            function renderTimer(timerData) {
                const container = document.getElementById('timerWidget');

                // Check if no timer data
                if (!timerData || Object.keys(timerData).length === 0) {
                    container.innerHTML = `
                        <div class="timer-no-data">
                            <div class="timer-no-data-icon">⏱️</div>
                            <div class="timer-no-data-text">No active timer</div>
                        </div>
                    `;
                    return;
                }

                const isRunning = timerData.isRunning || false;
                const duration = timerData.duration || timerData.totalSeconds || 0;
                const projectName = timerData.projectName || timerData.project?.name || 'No Project';
                const taskName = timerData.taskName || timerData.task?.title || null;
                const description = timerData.description || '';
                const startTime = timerData.startTime || timerData.startedAt || null;
                const isBillable = timerData.isBillable !== undefined ? timerData.isBillable : true;
                const organizationContactName = timerData.organizationContactName || timerData.organizationContact?.name || null;

                let html = `
                    <div class="timer-header">
                        <div class="timer-icon">${isRunning ? '▶️' : '⏹️'}</div>
                        <div class="timer-status">
                            <div class="timer-status-label ${isRunning ? 'running' : 'stopped'}">
                                ${isRunning ? 'TIMER RUNNING' : 'TIMER STOPPED'}
                            </div>
                            <div class="timer-project">${projectName}</div>
                        </div>
                    </div>

                    <div class="timer-display">
                        <div class="timer-time" id="timerTime">${formatTime(duration)}</div>
                    </div>

                    <div class="timer-details">
                `;

                if (description) {
                    html += `
                        <div class="timer-detail-row">
                            <div class="timer-detail-label">Description</div>
                            <div class="timer-detail-value">${description}</div>
                        </div>
                    `;
                }

                if (startTime) {
                    html += `
                        <div class="timer-detail-row">
                            <div class="timer-detail-label">Started</div>
                            <div class="timer-detail-value">${formatDateTime(startTime)}</div>
                        </div>
                    `;
                }

                if (organizationContactName) {
                    html += `
                        <div class="timer-detail-row">
                            <div class="timer-detail-label">Client</div>
                            <div class="timer-detail-value">${organizationContactName}</div>
                        </div>
                    `;
                }

                html += `</div>`;

                if (taskName) {
                    html += `
                        <div class="timer-task">
                            <div class="timer-task-label">Task</div>
                            <div class="timer-task-name">${taskName}</div>
                        </div>
                    `;
                }

                html += `
                    <div class="timer-footer">
                        <span class="timer-badge ${isBillable ? 'billable' : 'non-billable'}">
                            ${isBillable ? '💰 Billable' : 'Non-Billable'}
                        </span>
                        <span class="timer-timestamp">${formatDateTime(new Date().toISOString())}</span>
                    </div>
                `;

                if (isRunning) {
                    html += `
                        <div class="timer-progress">
                            <div class="timer-progress-bar" style="width: 100%; animation: pulse 2s infinite;"></div>
                        </div>
                    `;
                }

                container.innerHTML = html;

                // If timer is running, update every second
                if (isRunning) {
                    let currentDuration = duration;
                    setInterval(() => {
                        currentDuration++;
                        const timeDisplay = document.getElementById('timerTime');
                        if (timeDisplay) {
                            timeDisplay.textContent = formatTime(currentDuration);
                        }
                    }, 1000);
                }
            }

            // Add pulse animation
            const style = document.createElement('style');
            style.textContent = `
                @keyframes pulse {
                    0%, 100% { opacity: 1; }
                    50% { opacity: 0.7; }
                }
            `;
            document.head.appendChild(style);

            // Render the timer
            renderTimer(data);

            // Listen for data updates (if needed)
            window.addEventListener('message', function(event) {
                if (event.data && event.data.type === 'timer-update') {
                    renderTimer(event.data.payload);
                }
            });
        })();
    </script>
</body>
</html>
